      <stop offset="0%" stop-color="#15406B"/>
      <stop offset="100%" stop-color="#0A2540"/>
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E0A8"/>
